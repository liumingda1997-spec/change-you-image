<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>LBTI｜老板人格透视仪</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #f0f4fc 0%, #e9eef6 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Roboto, Helvetica, Arial, sans-serif;
            color: #1a2634;
            line-height: 1.5;
            padding: 28px 20px 48px;
        }

        /* 主容器 */
        .app-container {
            max-width: 760px;
            margin: 0 auto;
        }

        /* 卡片风格 - MBTI 柔和质感 */
        .card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 42px;
            padding: 32px 28px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.12), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* 首页 */
        .hero-icon {
            font-size: 58px;
            text-align: center;
            margin-bottom: 12px;
        }
        .hero-title {
            font-size: 38px;
            font-weight: 800;
            letter-spacing: -0.8px;
            text-align: center;
            background: linear-gradient(130deg, #1c2f44, #2b4b6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }
        .slogan {
            font-size: 17px;
            font-weight: 600;
            text-align: center;
            background: #eef3fc;
            padding: 14px 18px;
            border-radius: 80px;
            margin: 24px 0;
            color: #1f3b4c;
            border: 1px solid #cddfed;
        }
        .desc-text {
            font-size: 16px;
            color: #2c3e4e;
            margin-bottom: 28px;
            line-height: 1.5;
            background: #ffffffd9;
            padding: 20px;
            border-radius: 32px;
            border: 1px solid #eef2fa;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 16px;
        }
        .btn {
            display: inline-block;
            background: #ffffff;
            border: 1.5px solid #cbdde9;
            padding: 15px 22px;
            border-radius: 100px;
            font-size: 17px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #1e3a4d;
        }
        .btn-primary {
            background: #1f3f57;
            border-color: #1f3f57;
            color: white;
            box-shadow: 0 6px 12px -8px rgba(0,0,0,0.2);
        }
        .btn-primary:hover {
            background: #0e2e42;
            transform: scale(0.98);
        }
        .btn-outline:hover {
            background: #eef3fc;
            border-color: #9bb7cf;
        }

        /* 题目区域 */
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 28px;
            font-weight: 500;
            color: #5b6f82;
            border-bottom: 2px solid #e6edf6;
            padding-bottom: 12px;
        }
        .q-progress {
            font-size: 14px;
            background: #e2ebf5;
            padding: 6px 16px;
            border-radius: 60px;
            font-weight: 700;
            color: #1f3f57;
        }
        .q-text {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.38;
            margin-bottom: 34px;
            color: #0b2a3b;
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 24px;
        }
        .option-item {
            border: 1.5px solid #e2edf9;
            border-radius: 28px;
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .option-item:hover {
            transform: translateX(5px);
            border-color: #a6c1db;
            background: #fefefe;
        }
        .option-prefix {
            font-weight: 800;
            font-size: 22px;
            min-width: 40px;
            text-align: center;
        }
        .option-text {
            font-size: 16px;
            line-height: 1.4;
            flex: 1;
        }
        .option-a .option-prefix { color: #2c7a4a; }
        .option-b .option-prefix { color: #5e6f8d; }
        .option-c .option-prefix { color: #c23b22; }
        .option-a { border-color: #cfebdb; }
        .option-b { border-color: #e2eaf5; }
        .option-c { border-color: #ffe1d9; }

        .option-item.selected {
            border-width: 2.5px;
        }
        .option-a.selected { border-color: #2c7a4a; background: #f2faf5; }
        .option-b.selected { border-color: #5e6f8d; background: #f6f9fe; }
        .option-c.selected { border-color: #c23b22; background: #fff4f0; }

        .nav-buttons {
            display: flex;
            justify-content: flex-start;
        }
        .nav-btn {
            background: #eef3fc;
            border: none;
            border-radius: 60px;
            padding: 12px 28px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            color: #1f3f57;
            transition: 0.2s;
        }
        .quiz-footer {
            text-align: center;
            margin-top: 22px;
            font-size: 15px;
            font-weight: 500;
            color: #5b7f9a;
            background: #eef3fc99;
            display: inline-block;
            width: auto;
            border-radius: 60px;
            padding: 8px 18px;
            backdrop-filter: blur(2px);
        }

        /* 结果页 成分分析 */
        .result-card {
            text-align: left;
        }
        .result-icon {
            font-size: 68px;
            text-align: center;
            margin-bottom: 12px;
        }
        .result-code {
            font-size: 30px;
            font-weight: 800;
            letter-spacing: 2px;
            background: #e9f0f8;
            display: inline-block;
            padding: 8px 24px;
            border-radius: 80px;
            margin: 16px 0 8px;
            font-family: monospace;
        }
        .personality-tag {
            font-size: 24px;
            font-weight: 700;
            margin: 8px 0 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .tag-green { color: #1d7a46; }
        .tag-gray { color: #5b6f82; }
        .tag-red { color: #c23b22; }
        .analysis {
            font-size: 17px;
            line-height: 1.5;
            background: #fafeff;
            padding: 22px;
            border-radius: 32px;
            margin: 20px 0;
            border: 1px solid #e2edf6;
        }
        .dimension-breakdown {
            background: #ffffffec;
            border-radius: 32px;
            padding: 18px 20px;
            margin: 18px 0;
            border: 1px solid #e6edf6;
        }
        .dimension-title {
            font-weight: 800;
            font-size: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 4px solid #1f3f57;
            padding-left: 12px;
        }
        .dim-stats {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
            font-size: 15px;
        }
        .dim-badge {
            background: #f0f5fb;
            border-radius: 100px;
            padding: 6px 14px;
            font-weight: 500;
        }
        .copy-btn, .poster-btn {
            background: white;
            border: 1.5px solid #2c4b66;
            border-radius: 100px;
            padding: 13px;
            font-weight: 600;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .flex-btns {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        /* 模态框人格库 */
        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-mask.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-container {
            background: white;
            max-width: 560px;
            width: 90%;
            border-radius: 44px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 28px 24px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.2);
        }
        .persona-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin: 24px 0;
        }
        .persona-item {
            border-bottom: 1px solid #eef2fa;
            padding: 12px 0;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .persona-icon {
            font-size: 36px;
            min-width: 52px;
            text-align: center;
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2f3c;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 14px;
            z-index: 1200;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            font-weight: 500;
        }
        footer {
            font-size: 12px;
            text-align: center;
            color: #6f8eaa;
            margin-top: 32px;
        }
        @media (max-width: 550px) {
            .q-text { font-size: 21px; }
            .hero-title { font-size: 30px; }
            .card { padding: 24px 18px; }
            .dimension-title { font-size: 16px; }
        }
    </style>
</head>
<body>
<div class="app-container" id="app"></div>
<div id="modal-persona" class="modal-mask">
    <div class="modal-container">
        <h3 style="font-weight: 800; font-size: 26px;">📖 老板人格图鉴</h3>
        <div class="persona-list" id="personaList"></div>
        <div class="close-modal"><button class="btn-outline btn" id="closeModalBtn" style="width:100%">收起图鉴</button></div>
    </div>
</div>
<div id="toastMsg" class="toast-msg">✨ 操作成功</div>

<script>
    // ----------------------------- 题库 (21题，隐藏维度标签，仅文本) ---------------------------------
    const QUESTIONS = [
        { id:1, text:"发薪日老板的真实嘴脸？", options:[{label:"A：准点秒发还提前提醒，从不搞小动作", score:1, type:"A"},{label:"B：偶尔晚1-2天，会主动说一声", score:2, type:"B"},{label:"C：拖到你催烂还装死，找遍理由扣工资", score:3, type:"C"}], dim:1 },
        { id:2, text:"老板和异性同事相处的样子？", options:[{label:"A：全程公事公办，半分越界没有", score:1, type:"A"},{label:"B：正常交流，分寸感在线", score:2, type:"B"},{label:"C：满嘴荤段子动手动脚，刻意单独约谈", score:3, type:"C"}], dim:2 },
        { id:3, text:"项目炸锅第一时间？", options:[{label:"A：自己扛雷带队改，绝不甩锅", score:1, type:"A"},{label:"B：一起复盘问题，不甩脸子", score:2, type:"B"},{label:"C：光速推责骂员工，让你独自背锅", score:3, type:"C"}], dim:3 },
        { id:4, text:"布置工作时的操作？", options:[{label:"A：只定目标不插手，完全信任你", score:1, type:"A"},{label:"B：说清要求，偶尔问进度", score:2, type:"B"},{label:"C：事无巨细盯着管，屁大点事都要审", score:3, type:"C"}], dim:4 },
        { id:5, text:"加班和福利到底有多离谱？", options:[{label:"A：法定加班费拉满，节日福利不缺", score:1, type:"A"},{label:"B：偶尔无偿加个班，福利一般般", score:2, type:"B"},{label:"C：强制熬夜白干活，一毛福利都没有", score:3, type:"C"}], dim:1 },
        { id:6, text:"私下找你聊天的画风？", options:[{label:"A：只聊工作不扒隐私，尊重边界", score:1, type:"A"},{label:"B：偶尔闲聊几句，点到为止", score:2, type:"B"},{label:"C：打探私生活搞暧昧，说话油腻下头", score:3, type:"C"}], dim:2 },
        { id:7, text:"你犯点小错时？", options:[{label:"A：指问题教方法，不搞人身攻击", score:1, type:"A"},{label:"B：批评两句，要求整改就行", score:2, type:"B"},{label:"C：当众羞辱翻旧账，PUA到你怀疑人生", score:3, type:"C"}], dim:3 },
        { id:8, text:"改方案能有多折磨人？", options:[{label:"A：给清晰意见，尊重专业不折腾", score:1, type:"A"},{label:"B：说清调整方向，不反复返工", score:2, type:"B"},{label:"C：朝令夕改无限磨，最后用第一版", score:3, type:"C"}], dim:4 },
        { id:9, text:"外部客户找茬时？", options:[{label:"A：护住团队自己扛，不推员工挡枪", score:1, type:"A"},{label:"B：一起沟通解决，不甩锅", score:2, type:"B"},{label:"C：直接把你推出去，让你独自挨骂", score:3, type:"C"}], dim:3 },
        { id:10, text:"下班和周末被打扰频率？", options:[{label:"A：绝不占用私人时间，急事才联系", score:1, type:"A"},{label:"B：偶尔找一下，能接受", score:2, type:"B"},{label:"C：随时发消息，周末必须秒回不摸鱼", score:3, type:"C"}], dim:4 },
        { id:11, text:"涨薪晋升的画饼程度？", options:[{label:"A：按能力公平调，说到做到不忽悠", score:1, type:"A"},{label:"B：周期长点，但最终会兑现", score:2, type:"B"},{label:"C：天天画大饼，这辈子都别想兑现", score:3, type:"C"}], dim:1 },
        { id:12, text:"开会效率有多窒息？", options:[{label:"A：十分钟讲完核心，绝不废话", score:1, type:"A"},{label:"B：时长正常，有重点不拖沓", score:2, type:"B"},{label:"C：废话连篇跑题俩小时，纯纯浪费生命", score:3, type:"C"}], dim:4 },
        { id:13, text:"员工提离职时？", options:[{label:"A：好聚好散送祝福，不刁难不抹黑", score:1, type:"A"},{label:"B：走正常流程，不多说废话", score:2, type:"B"},{label:"C：恶意扣钱穿小鞋，背后到处诋毁", score:3, type:"C"}], dim:3 },
        { id:14, text:"老板的肢体接触分寸？", options:[{label:"A：保持安全距离，礼貌克制", score:1, type:"A"},{label:"B：正常社交接触，无不适感", score:2, type:"B"},{label:"C：刻意搭肩搂腰，借工作占便宜", score:3, type:"C"}], dim:2 },
        { id:15, text:"老板的承诺兑现率？", options:[{label:"A：说到做到，半句空话没有", score:1, type:"A"},{label:"B：大部分能兑现，偶尔拖延", score:2, type:"B"},{label:"C：满嘴跑火车，从来没兑现过一次", score:3, type:"C"}], dim:1 },
        { id:16, text:"工作自主性能有多少？", options:[{label:"A：给足空间随便干，允许试错", score:1, type:"A"},{label:"B：有一定自由，定期汇报就行", score:2, type:"B"},{label:"C：一举一动都要报备，毫无私人空间", score:3, type:"C"}], dim:4 },
        { id:17, text:"老板自己的工作态度？", options:[{label:"A：以身作则带头干，绝不摸鱼摆烂", score:1, type:"A"},{label:"B：完成本职工作，不甩锅给员工", score:2, type:"B"},{label:"C：自己天天躺平，活全推给下属干", score:3, type:"C"}], dim:3 },
        { id:18, text:"对待男女员工的区别？", options:[{label:"A：一视同仁，能力说话不双标", score:1, type:"A"},{label:"B：差别不大，基本公平", score:2, type:"B"},{label:"C：刻意偏袒异性，区别对待太明显", score:3, type:"C"}], dim:2 },
        { id:19, text:"工作内卷要求？", options:[{label:"A：张弛有度，不搞无效内卷", score:1, type:"A"},{label:"B：节奏正常，偶尔忙碌能接受", score:2, type:"B"},{label:"C：强制攀比加班，没活也要装忙", score:3, type:"C"}], dim:4 },
        { id:20, text:"绩效奖金发放套路？", options:[{label:"A：公平核算按时发，不搞猫腻", score:1, type:"A"},{label:"B：标准一般，正常发放不拖欠", score:2, type:"B"},{label:"C：找遍理由扣绩效，奖金直接吞了", score:3, type:"C"}], dim:1 },
        { id:21, text:"项目做成了功劳归谁？", options:[{label:"A：当众夸团队，功劳人人有份", score:1, type:"A"},{label:"B：口头表扬两句，认可大家付出", score:2, type:"B"},{label:"C：全揽自己身上，绝口不提员工半个字", score:3, type:"C"}], dim:3 }
    ];

    // ----------------------------- 人格映射 + 专属图标 -----------------------------
    const PERSONALITY_MAP = {
        "GRDF": { name:"打工救世主", tag:"✅ 神仙天花板·大方守界·扛事放权", tagColor:"green", icon:"😇🌟", analysis:"恭喜你！踩狗屎运遇到终极好老板😭 发薪准、不越界、敢担责、不折腾，有格局有人味，跟着他不仅能赚钱还能成长，打工人终极福报，锁死别放过！",吐槽:"抱紧大腿别松手，这种老板比大熊猫还稀有！" },
        "GRDK": { name:"靠谱严师老板", tag:"✅ 严而有度·大方守界·扛事管控", tagColor:"green", icon:"👨‍🏫⚖️", analysis:"虽然管得细、爱盯进度，偶尔有点严苛，但绝对是靠谱好老板！不抠门、不油腻、出事自己扛，跟着他能学到真东西，就是得耐得住他的“碎碎念”。",吐槽:"严格但值得跟，少抱怨多学本事。" },
        "GRFD": { name:"暖心护犊子老板", tag:"✅ 佛系暖心·大方守界·放权佛系", tagColor:"green", icon:"🛡️💖", analysis:"打工人梦中情导实锤！不抠门、不油腻、不甩锅，基本不管你，只要结果到位，你摸鱼他都睁一只眼闭一只眼，相处极度舒服，主打一个“你干活，我撑腰”。",吐槽:"神仙放权型，珍惜且低调。" },
        "MNTT": { name:"标准普通老板", tag:"🤷 中规中矩·普通务实·不坑不宠", tagColor:"gray", icon:"🤷‍♂️📦", analysis:"最常见的职场老板，不大方也不抠门，不油腻也不极致体面，偶尔甩锅但不频繁，适度管控不窒息，主打一个“不坑你、不宠你，凑活干能混日子”。",吐槽:"平凡就是福，别太较真。" },
        "GNTZ": { name:"大方普通老板", tag:"🤷 大方务实·普通分寸·偶尔甩锅", tagColor:"gray", icon:"💰🤷", analysis:"给钱大方、福利到位，边界感尚可，不算油腻，偶尔会甩锅、适度管控，没有大亮点也没有大槽点，是职场中“能接受、不反感”的普通好老板。",吐槽:"钱到位了，小毛病忍忍也行。" },
        "RYZT": { name:"体面普通老板", tag:"🤷 体面守界·抠门普通·偶尔管控", tagColor:"gray", icon:"🎩🤝", analysis:"边界感拉满、不油腻、待人体面，就是有点抠门，偶尔会管控、偶尔甩锅，不搞PUA不刁难，适合不图钱、只图工作环境舒服的打工人。",吐槽:"要体面就别太在乎钱包。" },
        "YNTK": { name:"普通抠门管控怪", tag:"❌ 轻度恶心·抠门普通·管控甩锅", tagColor:"red", icon:"🔒🪙", analysis:"抠门、爱管控、偶尔甩锅，但边界感尚可，不算油腻，恶心程度中等，不搞职场骚扰，就是钱少事多，能忍就忍，忍不了就跑。",吐槽:"骑驴找马，早点撤退。" },
        "MLSK": { name:"普通油腻榨取者", tag:"❌ 轻度恶心·普通油腻·甩锅管控", tagColor:"red", icon:"🦑😩", analysis:"油腻、甩锅、管控，但不算特别抠门，偶尔会给点福利，恶心程度比纯糟粕款低，适合缺钱、能忍受轻度油腻的打工人。",吐槽:"忍一时风平浪静？不，快跑。" },
        "YNZK": { name:"抠门普通甩锅怪", tag:"❌ 轻度恶心·抠门普通·偶尔甩锅", tagColor:"red", icon:"🛸💢", analysis:"抠门、偶尔甩锅、适度管控，边界感尚可，不油腻，没有特别离谱的操作，就是钱少、偶尔背锅，主打一个“能混但不舒服”。",吐槽:"混着可以，别走心。" },
        "YLZK": { name:"中度榨血压榨机", tag:"❌ 中度恶心·抠门油腻·甩锅管控", tagColor:"red", icon:"💉🧛", analysis:"抠门、油腻、甩锅、管控占3样，恶心程度中等偏上，钱少事多还受气，偶尔会搞PUA，能跑就别硬扛，长期待着会内耗。",吐槽:"赶紧更新简历，此地不宜久留。" },
        "YLSK": { name:"吸血压榨怪", tag:"❌ 终极噩梦·抠门油腻·甩锅管控", tagColor:"red", icon:"🧛‍♂️🩸", analysis:"恭喜你！喜提打工地狱级老板🤬 又抠又油腻，出事必甩锅，还天天盯着你折腾，精神+金钱双重压榨，拖欠工资、职场骚扰、无限PUA样样来，快跑！别犹豫！",吐槽:"逃！立刻！马上！保命要紧。" },
        "GLSK": { name:"大方油腻精", tag:"❌ 精神折磨·大方油腻·甩锅管控", tagColor:"red", icon:"💸🤢", analysis:"给钱很大方，但油腻越界、爱甩锅、爱折腾，钱给够但精神折磨拉满，每天都要忍受他的下头操作，纯纯金钱换尊严，能不能忍全看你缺钱程度。",吐槽:"拿钱买罪受，看你自己选择。" }
    };
    const NEGATIVE_LETTERS = new Set(['Y','L','S','K']);
    const NORMAL_SET = new Set(['M','N','Z','T']);
    
    // 维度字母判定 (严格)
    function getDimLetter(dimId, totalScore) {
        if(dimId === 1) { if(totalScore <= 7) return 'G'; if(totalScore <= 11) return 'M'; return 'Y'; }
        else if(dimId === 2) { if(totalScore <= 8) return 'R'; if(totalScore <= 10) return 'N'; return 'L'; }
        else if(dimId === 3) { if(totalScore <= 10) return 'D'; if(totalScore <= 14) return 'Z'; return 'S'; }
        else { if(totalScore <= 10) return 'F'; if(totalScore <= 14) return 'T'; return 'K'; }
    }
    
    function mapToPersonality(code) {
        if(PERSONALITY_MAP[code]) return PERSONALITY_MAP[code];
        const letters = code.split('');
        const negativeCount = letters.filter(l => NEGATIVE_LETTERS.has(l)).length;
        if(code === "MNTT" || letters.every(l=>NORMAL_SET.has(l))) return PERSONALITY_MAP["MNTT"];
        if(negativeCount === 0) return PERSONALITY_MAP["GRDF"];
        if(negativeCount === 1) {
            if(code.includes('K') && !code.includes('Y')) return PERSONALITY_MAP["GRDK"];
            if(code.includes('Z') && (code.includes('G')||code.includes('M'))) return PERSONALITY_MAP["GNTZ"];
            if(code.includes('Y') && !code.includes('L')) return PERSONALITY_MAP["YNTK"];
            if(code.includes('L')) return PERSONALITY_MAP["MLSK"];
            if(code.includes('S')) return PERSONALITY_MAP["YNZK"];
            return PERSONALITY_MAP["MNTT"];
        }
        if(negativeCount === 2) {
            if((code.includes('Y')&&code.includes('L')) || (code.includes('Y')&&code.includes('S'))) return PERSONALITY_MAP["YLZK"];
            if(code.includes('K')&&code.includes('L')) return PERSONALITY_MAP["MLSK"];
            if(code.includes('S')&&code.includes('K')) return PERSONALITY_MAP["YNZK"];
            return PERSONALITY_MAP["YLZK"];
        }
        if(negativeCount === 3) {
            if(code.includes('Y')&&code.includes('L')&&code.includes('S')) return PERSONALITY_MAP["YLSK"];
            return PERSONALITY_MAP["YLZK"];
        }
        if(negativeCount >= 4) return PERSONALITY_MAP["YLSK"];
        if(code.includes('G') && negativeCount===3) return PERSONALITY_MAP["GLSK"];
        return PERSONALITY_MAP["MNTT"];
    }
    
    // 维度详细解读函数 (成分分析)
    function getDimensionDetails(dimScores) {
        // 各维度总分及字母
        const dim1Score = dimScores[1], dim2Score = dimScores[2], dim3Score = dimScores[3], dim4Score = dimScores[4];
        const d1Letter = getDimLetter(1, dim1Score);
        const d2Letter = getDimLetter(2, dim2Score);
        const d3Letter = getDimLetter(3, dim3Score);
        const d4Letter = getDimLetter(4, dim4Score);
        
        const dimMap = {
            1: { name:"💰 金钱格局", range:"5-15分", letters: { G:"大方神仙款 (≤7分)", M:"普通务实款 (8-11分)", Y:"抠门压榨款 (≥12分)" }, score: dim1Score, letter: d1Letter },
            2: { name:"🤝 边界素养", range:"4-12分", letters: { R:"体面正常人 (≤8分)", N:"普通分寸款 (9-10分)", L:"油腻下头怪 (≥11分)" }, score: dim2Score, letter: d2Letter },
            3: { name:"💪 责任担当", range:"6-18分", letters: { D:"扛事靠谱人 (≤10分)", Z:"普通担当款 (11-14分)", S:"甩锅巨婴 (≥15分)" }, score: dim3Score, letter: d3Letter },
            4: { name:"⚙️ 管理风格", range:"6-18分", letters: { F:"通透甩手掌柜 (≤10分)", T:"普通管理款 (11-14分)", K:"控制折腾怪 (≥15分)" }, score: dim4Score, letter: d4Letter }
        };
        return dimMap;
    }
    
    // ---------- 状态 ----------
    let answers = new Array(21).fill(null);
    let currentIndex = 0;
    let currentView = 'home';
    let resultData = null;
    let allowClick = true;

    const app = document.getElementById('app');
    const modal = document.getElementById('modal-persona');
    const toast = document.getElementById('toastMsg');
    function showToast(msg) { toast.innerText = msg; toast.style.opacity = '1'; setTimeout(()=> toast.style.opacity = '0', 1800); }
    
    function render() {
        if(currentView === 'home') renderHome();
        else if(currentView === 'quiz') renderQuiz();
        else if(currentView === 'result') renderResult();
    }
    
    function renderHome() {
        app.innerHTML = `
            <div class="card">
                <div class="hero-icon">🧑‍💼🔍</div>
                <div class="hero-title">LBTI｜老板人格透视仪</div>
                <div class="slogan">⚡2分钟戳穿伪装 · 神仙/普通/奇葩一键现形⚡</div>
                <div class="desc-text">
                    🧨 别装了家人们！你老板的真面目，21道题扒得底朝天🤬<br><br>
                    💰 是发薪准时的神仙老板？🤷 是中规中矩的普通老板？<br>
                    🧛 还是抠门油腻的吸血蛆王？<br><br>
                    🎯 点击「开始测试」，2分钟解锁老板终极人格，生成专属吐槽报告，一键复制骂街、保存海报，精准开怼！
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" id="startTestBtn">🔥 开始测试 · 一键扒皮</button>
                    <button class="btn btn-outline" id="viewLibraryBtn">📖 老板人格库 · 避雷/吸欧气</button>
                </div>
            </div>
        `;
        document.getElementById('startTestBtn')?.addEventListener('click', () => { currentView = 'quiz'; currentIndex = 0; render(); });
        document.getElementById('viewLibraryBtn')?.addEventListener('click', showPersonaLibrary);
    }
    
    function showPersonaLibrary() {
        const container = document.getElementById('personaList');
        if(container) {
            container.innerHTML = Object.entries(PERSONALITY_MAP).map(([code, val]) => `
                <div class="persona-item">
                    <div class="persona-icon">${val.icon}</div>
                    <div><strong style="font-family:monospace;">${code}</strong> · ${val.name}<br><span style="font-size:13px;color:#475569">${val.tag}</span></div>
                </div>
            `).join('');
        }
        modal.classList.add('active');
    }
    
    // 自动跳转
    function handleOptionSelect(score) {
        if(!allowClick) return;
        allowClick = false;
        answers[currentIndex] = score;
        renderQuiz(); // 高亮刷新
        
        setTimeout(() => {
            if(currentIndex === 20) {
                if(answers.some(a => a === null)) { showToast('别偷懒！测完21道题，才能扒出老板真面目🤬'); allowClick = true; return; }
                computeResult();
            } else {
                currentIndex++;
                renderQuiz();
            }
            allowClick = true;
        }, 100);
    }
    
    function renderQuiz() {
        const q = QUESTIONS[currentIndex];
        const selectedScore = answers[currentIndex];
        let selectedType = null;
        if(selectedScore === 1) selectedType = 'A';
        else if(selectedScore === 2) selectedType = 'B';
        else if(selectedScore === 3) selectedType = 'C';
        
        const optionsHtml = q.options.map(opt => {
            const isSelected = (selectedType === opt.type);
            const additionalClass = isSelected ? 'selected' : '';
            let colorClass = (opt.type === 'A') ? 'option-a' : (opt.type === 'B') ? 'option-b' : 'option-c';
            return `<div class="option-item ${colorClass} ${additionalClass}" data-score="${opt.score}" data-type="${opt.type}">
                        <span class="option-prefix">${opt.type}</span>
                        <span class="option-text">${opt.label}</span>
                    </div>`;
        }).join('');
        const progressPercent = Math.round((currentIndex+1)/21*100);
        app.innerHTML = `
            <div class="card">
                <div class="question-header"><span>📋 第 ${currentIndex+1} / 21 题</span><span class="q-progress">${progressPercent}%</span></div>
                <div class="q-text">${q.text}</div>
                <div class="options-list" id="optionsList">${optionsHtml}</div>
                <div class="nav-buttons">
                    <button class="nav-btn" id="prevBtn" ${currentIndex===0 ? 'disabled style="opacity:0.5"' : ''}>← 上一题</button>
                </div>
                <div class="quiz-footer">🎭 即将撕下你老板的伪装面具 🎭</div>
            </div>
        `;
        document.querySelectorAll('.option-item').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const score = parseInt(el.dataset.score);
                handleOptionSelect(score);
            });
        });
        document.getElementById('prevBtn')?.addEventListener('click', () => {
            if(currentIndex > 0) {
                currentIndex--;
                renderQuiz();
            }
        });
    }
    
    function computeResult() {
        const dimScores = {1:0,2:0,3:0,4:0};
        QUESTIONS.forEach((q, idx) => { dimScores[q.dim] += answers[idx]; });
        const dim1Letter = getDimLetter(1, dimScores[1]);
        const dim2Letter = getDimLetter(2, dimScores[2]);
        const dim3Letter = getDimLetter(3, dimScores[3]);
        const dim4Letter = getDimLetter(4, dimScores[4]);
        const code = dim1Letter+dim2Letter+dim3Letter+dim4Letter;
        const personality = mapToPersonality(code);
        resultData = { code, personality, dimScores };
        currentView = 'result';
        render();
    }
    
    function renderResult() {
        const p = resultData.personality;
        const tagClass = p.tagColor === 'green' ? 'tag-green' : (p.tagColor==='red'? 'tag-red' : 'tag-gray');
        const dimDetails = getDimensionDetails(resultData.dimScores);
        
        let dimHtml = '';
        for(let i=1; i<=4; i++) {
            const dim = dimDetails[i];
            const letterDesc = dim.letters[dim.letter] || "未知";
            dimHtml += `
                <div class="dimension-breakdown">
                    <div class="dimension-title">${dim.name}</div>
                    <div>得分: ${dim.score} 分 (范围 ${dim.range}) &nbsp;→&nbsp; <strong>${dim.letter} · ${letterDesc}</strong></div>
                    <div class="dim-stats">
                        <span class="dim-badge">${dim.letter === 'G'?'✨大方':(dim.letter==='M'?'💵普通':(dim.letter==='Y'?'🩸抠门':'—'))}</span>
                        <span class="dim-badge">${dim.letter === 'R'?'🛡️体面':(dim.letter==='N'?'👔分寸':(dim.letter==='L'?'🤢油腻':'—'))}</span>
                        <span class="dim-badge">${dim.letter === 'D'?'💪担当':(dim.letter==='Z'?'⚖️普通':(dim.letter==='S'?'🤡甩锅':'—'))}</span>
                        <span class="dim-badge">${dim.letter === 'F'?'🍃放权':(dim.letter==='T'?'📌管控':(dim.letter==='K'?'🔒控制':'—'))}</span>
                    </div>
                    <div style="font-size: 14px; margin-top: 8px; color:#4f6f8f;">${dim.letter === 'G'?'💰福利准时大方':(dim.letter==='M'?'中规中矩，不抠不奢':(dim.letter==='Y'?'铁公鸡一毛不拔':''))}
                    ${dim.letter === 'R'?'✋边界清晰，尊重隐私':(dim.letter==='N'?'普通距离感':(dim.letter==='L'?'越界骚扰预警':''))}
                    ${dim.letter === 'D'?'🛡️主动担责':(dim.letter==='Z'?'偶尔甩锅':(dim.letter==='S'?'遇事就推卸':''))}
                    ${dim.letter === 'F'?'🎯充分信任授权':(dim.letter==='T'?'适度管控':(dim.letter==='K'?'事无巨细控制狂':''))}
                    </div>
                </div>
            `;
        }
        
        app.innerHTML = `
            <div class="card result-card" id="resultPosterArea">
                <div class="result-icon">${p.icon}</div>
                <div class="result-code">${resultData.code}</div>
                <div class="personality-tag ${tagClass}">${p.tag}</div>
                <div style="font-size: 32px; font-weight: 800; margin-bottom: 10px;">${p.name}</div>
                <div class="analysis">${p.analysis}<br><br><strong>💬 打工人吐槽：</strong> ${p.吐槽}</div>
                
                <h3 style="margin: 18px 0 8px; font-weight: 700;">📊 成分分析 · 四维拆解</h3>
                ${dimHtml}
                <div style="background: #eef3fc; border-radius: 28px; padding: 14px; margin-top: 10px; font-size: 14px; text-align: center; color:#2c5a74;">
                    ⚡ 分数越低越“神仙”，分数越高越“糟心”｜每个维度独立判定，不搞绝对化
                </div>
                <button class="copy-btn" id="copyResultBtn">📋 一键复制吐槽文案</button>
                <div class="flex-btns"><button class="poster-btn" id="savePosterBtn">🖼️ 保存海报（截图）</button><button class="poster-btn" id="restartBtn">🔄 重新测试</button></div>
            </div>
        `;
        document.getElementById('copyResultBtn')?.addEventListener('click', () => {
            const text = `【LBTI老板人格】${resultData.code} ${p.name}\n${p.tag}\n${p.analysis}\n${p.吐槽}\n——来自打工人嘴替测试`;
            navigator.clipboard.writeText(text).then(()=>showToast('✅ 吐槽文案已复制，去群里开怼！'));
        });
        document.getElementById('savePosterBtn')?.addEventListener('click', () => {
            const element = document.getElementById('resultPosterArea');
            html2canvas(element, { scale: 2, backgroundColor: '#ffffff' }).then(canvas => {
                const link = document.createElement('a');
                link.download = `LBTI_老板人格_${resultData.code}.png`;
                link.href = canvas.toDataURL();
                link.click();
                showToast('海报已保存至相册');
            }).catch(()=>showToast('生成失败，可截图保存'));
        });
        document.getElementById('restartBtn')?.addEventListener('click', () => {
            answers = new Array(21).fill(null);
            currentIndex = 0;
            currentView = 'home';
            render();
        });
    }
    
    document.getElementById('closeModalBtn')?.addEventListener('click', () => modal.classList.remove('active'));
    modal.addEventListener('click', (e) => { if(e.target === modal) modal.classList.remove('active'); });
    render();
</script>
</body>
</html>
