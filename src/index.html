<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片批量尺寸转换工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 40px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px 40px;
        }

        /* 上传区域 */
        .upload-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title .icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
        }

        .upload-area {
            border: 3px dashed #c7d2fe;
            border-radius: 16px;
            padding: 50px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8faff;
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .upload-hint {
            font-size: 14px;
            color: #888;
        }

        .upload-hint span {
            color: #667eea;
            font-weight: 500;
        }

        #fileInput {
            display: none;
        }

        /* 尺寸选择 */
        .size-section {
            margin-bottom: 30px;
        }

        .size-options {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .size-option {
            position: relative;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafafa;
        }

        .size-option:hover {
            border-color: #a5b4fc;
            background: #f5f7ff;
        }

        .size-option.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #eef2ff 0%, #f5f3ff 100%);
        }

        .size-option.selected::after {
            content: '✓';
            position: absolute;
            top: 8px;
            right: 10px;
            width: 22px;
            height: 22px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            color: white;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .size-label {
            font-size: 13px;
            color: #888;
            margin-bottom: 6px;
        }

        .size-value {
            font-size: 20px;
            font-weight: 700;
            color: #333;
        }

        .size-value span {
            font-size: 12px;
            color: #888;
            font-weight: normal;
        }

        /* 图片列表 */
        .images-section {
            margin-bottom: 30px;
        }

        .images-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .images-count {
            font-size: 14px;
            color: #888;
        }

        .clear-btn {
            padding: 6px 16px;
            background: #fef2f2;
            color: #ef4444;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: #fee2e2;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
            background: #f9fafb;
            border-radius: 12px;
        }

        .image-item {
            position: relative;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .image-thumb {
            width: 100%;
            height: 100px;
            object-fit: cover;
            display: block;
        }

        .image-info {
            padding: 8px 10px;
        }

        .image-name {
            font-size: 12px;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .image-size {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
        }

        .remove-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 22px;
            height: 22px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .image-item:hover .remove-btn {
            opacity: 1;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 14px;
        }

        /* 操作按钮 */
        .action-section {
            display: flex;
            gap: 15px;
            justify-content: center;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        .btn {
            padding: 14px 40px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5);
        }

        .btn-success:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 进度条 */
        .progress-section {
            margin-top: 20px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            transition: width 0.3s;
            width: 0%;
        }

        .progress-text {
            text-align: center;
            margin-top: 8px;
            font-size: 14px;
            color: #666;
        }

        /* 结果区域 */
        .result-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            display: none;
        }

        .result-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
            background: #f0fdf4;
            border-radius: 12px;
        }

        .result-item {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
        }

        .result-thumb {
            width: 100%;
            height: 80px;
            object-fit: cover;
        }

        .result-name {
            padding: 6px 8px;
            font-size: 11px;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }

            .size-options {
                grid-template-columns: repeat(2, 1fr);
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 22px;
            }

            .action-section {
                flex-direction: column;
            }

            .btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖼️ 图片批量尺寸转换工具</h1>
            <p>上传图片，一键批量转换为多种尺寸，自动重命名打包下载</p>
        </div>

        <div class="content">
            <!-- 上传区域 -->
            <div class="upload-section">
                <div class="section-title">
                    <span class="icon">1</span>
                    上传图片
                </div>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">点击或拖拽图片到此处上传</div>
                    <div class="upload-hint">支持 JPG、PNG、WebP 格式，<span>不限制数量</span></div>
                </div>
                <input type="file" id="fileInput" accept="image/*" multiple>
            </div>

            <!-- 尺寸选择 -->
            <div class="size-section">
                <div class="section-title">
                    <span class="icon">2</span>
                    选择目标尺寸（可多选）
                </div>
                <div class="size-options">
                    <div class="size-option" data-width="640" data-height="1140" data-label="竖图">
                        <div class="size-label">竖图</div>
                        <div class="size-value">640 × 1140 <span>px</span></div>
                    </div>
                    <div class="size-option" data-width="1140" data-height="640" data-label="横图">
                        <div class="size-label">横图</div>
                        <div class="size-value">1140 × 640 <span>px</span></div>
                    </div>
                    <div class="size-option" data-width="800" data-height="1200" data-label="竖版">
                        <div class="size-label">竖版</div>
                        <div class="size-value">800 × 1200 <span>px</span></div>
                    </div>
                    <div class="size-option" data-width="1280" data-height="720" data-label="横版">
                        <div class="size-label">横版</div>
                        <div class="size-value">1280 × 720 <span>px</span></div>
                    </div>
                </div>
            </div>

            <!-- 图片列表 -->
            <div class="images-section">
                <div class="images-header">
                    <div class="section-title" style="margin-bottom: 0;">
                        <span class="icon">3</span>
                        图片列表
                    </div>
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <span class="images-count" id="imagesCount">共 0 张图片</span>
                        <button class="clear-btn" id="clearBtn" style="display: none;">清空全部</button>
                    </div>
                </div>
                <div class="image-grid" id="imageGrid">
                    <div class="empty-state">暂无图片，请先上传</div>
                </div>
            </div>

            <!-- 进度条 -->
            <div class="progress-section" id="progressSection">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">处理中... 0%</div>
            </div>

            <!-- 操作按钮 -->
            <div class="action-section">
                <button class="btn btn-primary" id="convertBtn" disabled>
                    ⚡ 开始转换
                </button>
                <button class="btn btn-success" id="downloadBtn" disabled>
                    📦 打包下载
                </button>
            </div>

            <!-- 结果区域 -->
            <div class="result-section" id="resultSection">
                <div class="result-title">✅ 转换完成</div>
                <div class="result-grid" id="resultGrid"></div>
            </div>
        </div>
    </div>

    <script>
        let uploadedFiles = [];
        let convertedFiles = [];
        let selectedSizes = [];

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const imageGrid = document.getElementById('imageGrid');
        const imagesCount = document.getElementById('imagesCount');
        const clearBtn = document.getElementById('clearBtn');
        const convertBtn = document.getElementById('convertBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const progressSection = document.getElementById('progressSection');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const resultSection = document.getElementById('resultSection');
        const resultGrid = document.getElementById('resultGrid');

        // 上传区域点击
        uploadArea.addEventListener('click', () => fileInput.click());

        // 拖拽事件
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        // 文件选择
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
            fileInput.value = '';
        });

        // 处理文件
        function handleFiles(files) {
            const imageFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
            
            imageFiles.forEach(file => {
                if (!uploadedFiles.find(f => f.name === file.name && f.size === file.size)) {
                    uploadedFiles.push(file);
                }
            });

            renderImageList();
            updateButtons();
        }

        // 渲染图片列表
        function renderImageList() {
            if (uploadedFiles.length === 0) {
                imageGrid.innerHTML = '<div class="empty-state">暂无图片，请先上传</div>';
                clearBtn.style.display = 'none';
                imagesCount.textContent = '共 0 张图片';
                return;
            }

            clearBtn.style.display = 'block';
            imagesCount.textContent = `共 ${uploadedFiles.length} 张图片`;

            imageGrid.innerHTML = uploadedFiles.map((file, index) => {
                const url = URL.createObjectURL(file);
                const sizeKB = (file.size / 1024).toFixed(1);
                return `
                    <div class="image-item">
                        <img src="${url}" class="image-thumb" alt="${file.name}">
                        <button class="remove-btn" onclick="removeImage(${index})">×</button>
                        <div class="image-info">
                            <div class="image-name" title="${file.name}">${file.name}</div>
                            <div class="image-size">${sizeKB} KB</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 删除单张图片
        function removeImage(index) {
            uploadedFiles.splice(index, 1);
            renderImageList();
            updateButtons();
        }

        // 清空全部
        clearBtn.addEventListener('click', () => {
            uploadedFiles = [];
            convertedFiles = [];
            resultSection.style.display = 'none';
            renderImageList();
            updateButtons();
        });

        // 尺寸选择
        document.querySelectorAll('.size-option').forEach(option => {
            option.addEventListener('click', () => {
                option.classList.toggle('selected');
                updateSelectedSizes();
                updateButtons();
            });
        });

        function updateSelectedSizes() {
            selectedSizes = Array.from(document.querySelectorAll('.size-option.selected')).map(el => ({
                width: parseInt(el.dataset.width),
                height: parseInt(el.dataset.height),
                label: el.dataset.label
            }));
        }

        // 更新按钮状态
        function updateButtons() {
            convertBtn.disabled = uploadedFiles.length === 0 || selectedSizes.length === 0;
            downloadBtn.disabled = convertedFiles.length === 0;
        }

        // 获取文件名（不含扩展名）
        function getFileNameWithoutExt(filename) {
            const lastDot = filename.lastIndexOf('.');
            return lastDot === -1 ? filename : filename.substring(0, lastDot);
        }

        // 获取文件扩展名
        function getFileExt(filename) {
            const lastDot = filename.lastIndexOf('.');
            return lastDot === -1 ? 'png' : filename.substring(lastDot + 1);
        }

        // 调整图片尺寸
        function resizeImage(file, targetWidth, targetHeight) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    canvas.width = targetWidth;
                    canvas.height = targetHeight;

                    // 计算缩放比例，保持图片比例居中裁剪
                    const scale = Math.max(targetWidth / img.width, targetHeight / img.height);
                    const x = (targetWidth - img.width * scale) / 2;
                    const y = (targetHeight - img.height * scale) / 2;

                    ctx.drawImage(img, x, y, img.width * scale, img.height * scale);

                    const ext = getFileExt(file.name).toLowerCase();
                    const mimeType = ext === 'jpg' || ext === 'jpeg' ? 'image/jpeg' : 
                                     ext === 'webp' ? 'image/webp' : 'image/png';
                    const quality = 0.92;

                    canvas.toBlob((blob) => {
                        const baseName = getFileNameWithoutExt(file.name);
                        const newName = `${baseName}_${targetWidth}x${targetHeight}.${ext === 'jpg' ? 'jpg' : ext === 'jpeg' ? 'jpg' : ext}`;
                        resolve({
                            blob,
                            name: newName,
                            width: targetWidth,
                            height: targetHeight
                        });
                    }, mimeType, quality);
                };
                img.src = URL.createObjectURL(file);
            });
        }

        // 开始转换
        convertBtn.addEventListener('click', async () => {
            if (uploadedFiles.length === 0 || selectedSizes.length === 0) return;

            convertedFiles = [];
            resultSection.style.display = 'none';
            progressSection.style.display = 'block';
            convertBtn.disabled = true;
            downloadBtn.disabled = true;

            const total = uploadedFiles.length * selectedSizes.length;
            let completed = 0;

            for (const file of uploadedFiles) {
                for (const size of selectedSizes) {
                    const result = await resizeImage(file, size.width, size.height);
                    convertedFiles.push(result);
                    completed++;
                    
                    const percent = Math.round((completed / total) * 100);
                    progressFill.style.width = percent + '%';
                    progressText.textContent = `处理中... ${percent}% (${completed}/${total})`;
                }
            }

            progressText.textContent = `转换完成！共生成 ${convertedFiles.length} 张图片`;
            renderResults();
            resultSection.style.display = 'block';
            convertBtn.disabled = false;
            downloadBtn.disabled = false;
        });

        // 渲染结果
        function renderResults() {
            resultGrid.innerHTML = convertedFiles.map(file => {
                const url = URL.createObjectURL(file.blob);
                return `
                    <div class="result-item">
                        <img src="${url}" class="result-thumb" alt="${file.name}">
                        <div class="result-name" title="${file.name}">${file.name}</div>
                    </div>
                `;
            }).join('');
        }

        // 打包下载
        downloadBtn.addEventListener('click', async () => {
            if (convertedFiles.length === 0) return;

            downloadBtn.disabled = true;
            downloadBtn.textContent = '📦 打包中...';

            const zip = new JSZip();
            const folder = zip.folder('转换后图片');

            convertedFiles.forEach(file => {
                folder.file(file.name, file.blob);
            });

            const content = await zip.generateAsync({ type: 'blob' });
            
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = `图片批量转换_${new Date().toLocaleDateString().replace(/\//g, '-')}.zip`;
            link.click();

            downloadBtn.disabled = false;
            downloadBtn.innerHTML = '📦 打包下载';
        });
    </script>
</body>
</html>
